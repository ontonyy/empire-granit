  <text x="154" y="103" font-size="35" font-family="Manrope, Arial, sans-serif" font-weight="600" letter-spacing="7" fill="#7a5a44">GRANIT</text>
  <line x1="152" y1="112" x2="500" y2="112" stroke="#b89f87" stroke-width="2"/>
